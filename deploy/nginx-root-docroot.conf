server {
    listen 80;
    server_name your-domain.com;

    root /Users/user/projects/mailr;
    index index.php;

    # Block sensitive directories/files when root is docroot
    location ~ ^/(src|storage|scripts)/ {
        deny all;
    }
    location ~ /\.(env|git) {
        deny all;
    }

    # Static assets (root-docroot mode)
    location /public/assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # App routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM (adjust socket or host:port for your environment)
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }
}
